{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>My Orders</title>
<style>
/* ==========================
   GENERAL
========================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background:linear-gradient(135deg,#f6f8fb,#e9eef5);
    color:#222;
}

/* ==========================
   PAGE TITLE
========================== */

h1{
    text-align:center;
    margin:30px 0;
    font-size:40px;
    color:#111;
}

/* ==========================
   ORDER GRID
========================== */

#order-list{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;
    padding:30px;
    max-width:1400px;
    margin:auto;
}

/* ==========================
   ORDER CARD
========================== */

.order-card{
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 10px 24px rgba(0,0,0,.12);
    display:flex;
    flex-direction:column;
    transition:.3s;
}

.order-card:hover{
    transform:translateY(-6px);
    box-shadow:0 15px 30px rgba(0,0,0,.18);
}

/* ==========================
   IMAGE
========================== */

.order-card img{
    width:100%;
    height:280px;
    object-fit:cover;
    background:#f3f3f3;
}

/* ==========================
   PRODUCT NAME
========================== */

.order-card h2{
    font-size:24px;
    margin:15px;
    text-transform:capitalize;
    color:#222;
}

/* ==========================
   PRICE
========================== */

.order-card h3{
    margin:0 15px;
    font-size:20px;
    color:#333;
}

/* ==========================
   CUSTOMER NAME
========================== */

.order-card p{
    margin:10px 15px;
    font-size:18px;
    color:#666;
}

/* ==========================
   CANCEL BUTTON
========================== */

.cancel-btn{
    margin:15px;
    padding:12px;
    border:none;
    border-radius:30px;
    background:#ffc107;
    color:#111;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    transition:.3s;
}

.cancel-btn:hover{
    background:#e0a800;
}

/* ==========================
   LAPTOP
========================== */

@media (max-width:1024px){

    #order-list{
        grid-template-columns:repeat(2,1fr);
    }

    .order-card img{
        height:240px;
    }

    h1{
        font-size:34px;
    }

}

/* ==========================
   TABLET
========================== */

@media (max-width:768px){

    #order-list{
        grid-template-columns:repeat(2,1fr);
        gap:20px;
        padding:20px;
    }

    .order-card img{
        height:220px;
    }

    .order-card h2{
        font-size:22px;
    }

    .order-card h3{
        font-size:18px;
    }

    .order-card p{
        font-size:16px;
    }

    .cancel-btn{
        width:100%;
        margin:15px 0 0;
        border-radius:0 0 18px 18px;
    }

}

/* ==========================
   MOBILE
========================== */

@media (max-width:480px){

    h1{
        font-size:28px;
    }

    #order-list{
        grid-template-columns:1fr;
        padding:15px;
    }

    .order-card{
        width:100%;
    }

    .order-card img{
        height:220px;
    }

    .order-card h2{
        font-size:20px;
    }

    .order-card h3{
        font-size:18px;
    }

    .order-card p{
        font-size:16px;
    }

    .cancel-btn{
        width:100%;
        margin:15px 0 0;
        border-radius:0 0 18px 18px;
        font-size:15px;
    }

}</style>
</head>

<body>

<h1>📦 My Orders</h1>

<div id="order-list">

{% for order in orders %}

<div class="order-card">

    <!-- IMAGE -->
  <img src="{{ order.product_image }}" alt="product">

<h2>
{{ order.product_name }}
</h2>

<h3>
₹{{ order.product_price }}
</h3>

    <p>
        {{ order.username }}
    </p>

    <a href="{% url 'cancel_order' order.id %}">
        <button class="cancel-btn">
            Cancel Order
        </button>
    </a>

</div>

{% endfor %}

</div>



</body>
</html>
