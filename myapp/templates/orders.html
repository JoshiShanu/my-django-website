{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>My Orders</title>

<style>

body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #f6f8fb, #e9eef5);
    color: #222;
}

h1 {
    text-align: center;
    margin: 30px 0 10px;
    font-size: 38px;
    color: #111;
}

/* Orders Grid */
#order-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, 300px);
    gap: 25px;
    justify-content: center;
    padding: 30px;
    width: 100%;
    max-width: 1400px;
    margin: auto;
}

/* Order Card */
.order-card {
    width: 300px;
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.2s ease, box-shadow 0.2s ease;}


.order-card:hover {
    transform: translateY(-5px);
    box-shadow:0 14px 30px rgba(0,0,0,0.16);
}


/* Image */
.order-card img {
      width: 100%;
    height: 260px;
    object-fit: cover;
    background: #f3f3f3;
}


/* Product Name */
.order-card h2 {
    font-size:24px;
    margin:14px 16px 6px;
    text-transform:capitalize;
    color:#222;
}


/* Price */
.order-card h3 {
    font-size:20px;
    font-weight:700;
    margin:0 16px;
    color:#2b2b2b;
}


/* Username */
.order-card p {
    font-size:18px;
    margin:8px 16px 12px;
    color:#666;
}


/* Cancel Button */
.cancel-btn {

    margin:16px;
    border:none;
    padding:12px 14px;
    border-radius:999px;

    background:#ffcc4d;
    color:#111;

    cursor:pointer;
    font-size:15px;
    font-weight:600;

    transition:0.2s ease;
}


.cancel-btn:hover {
    background:#f1b81c;
}

</style>
</head>

<body>

<h1>📦 My Orders</h1>

<div id="order-list">

{% for order in orders %}

<div class="order-card">

    <!-- IMAGE -->
  <img src="{{ order.product_image }}" alt="product">

<h2>
{{ order.product_name }}
</h2>

<h3>
₹{{ order.product_price }}
</h3>

    <p>
        {{ order.username }}
    </p>

    <a href="{% url 'cancel_order' order.id %}">
        <button class="cancel-btn">
            Cancel Order
        </button>
    </a>

</div>

{% endfor %}

</div>



</body>
</html>
