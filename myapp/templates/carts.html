{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
    <link href="{% static 'css/index.css' %}" rel="stylesheet">
<style>
   /* ===========================
   GENERAL
=========================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background:linear-gradient(135deg,#f6f8fb,#e9eef5);
    color:#222;
}

/* ===========================
   HEADINGS
=========================== */

h1{
    text-align:center;
    margin:30px 0 15px;
    font-size:40px;
    color:#111;
}

.topbar{
    text-align:center;
    font-size:20px;
    margin-bottom:30px;
    color:#444;
}

/* ===========================
   CART GRID
=========================== */

#cart-items{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;
    padding:30px;
    max-width:1400px;
    margin:auto;
}

/* ===========================
   CARD
=========================== */

.cart-card{
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 10px 24px rgba(0,0,0,.12);
    display:flex;
    flex-direction:column;
    transition:.3s;
}

.cart-card:hover{
    transform:translateY(-6px);
    box-shadow:0 15px 30px rgba(0,0,0,.18);
}

.cart-card img{
    width:100%;
    height:280px;
    object-fit:cover;
    background:#f5f5f5;
}

.cart-card h3{
    font-size:24px;
    margin:15px;
    text-transform:capitalize;
}

.price{
    margin:0 15px;
    font-size:20px;
    font-weight:bold;
}

.quantity{
    margin:10px 15px;
    color:#666;
    font-size:18px;
}

/* ===========================
   BUTTONS
=========================== */

.buttons{
    display:flex;
    gap:10px;
    padding:15px;
    margin-top:auto;
}

.remove-btn,
.buy-btn{
    flex:1;
    padding:12px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-size:16px;
    transition:.3s;
}

.remove-btn{
    background:#ffc107;
    color:#111;
}

.remove-btn:hover{
    background:#e0a800;
}

.buy-btn{
    background:#222;
    color:white;
}

.buy-btn:hover{
    background:#000;
}

/* ===========================
   EMPTY CART
=========================== */

.empty{
    grid-column:1/-1;
    text-align:center;
    font-size:24px;
    color:#666;
    padding:50px;
}

/* ===========================
   LAPTOP
=========================== */

@media (max-width:1024px){

    #cart-items{
        grid-template-columns:repeat(2,1fr);
    }

    .cart-card img{
        height:240px;
    }

    h1{
        font-size:34px;
    }

}

/* ===========================
   TABLET
=========================== */

@media (max-width:768px){

    #cart-items{
        grid-template-columns:repeat(2,1fr);
        padding:20px;
        gap:20px;
    }

    .cart-card img{
        height:220px;
    }

    .cart-card h3{
        font-size:22px;
    }

    .price{
        font-size:18px;
    }

    .quantity{
        font-size:16px;
    }

    .buttons{
        flex-direction:column;
    }

    .remove-btn,
    .buy-btn{
        width:100%;
    }

}

/* ===========================
   MOBILE
=========================== */

@media (max-width:480px){

    h1{
        font-size:28px;
    }

    .topbar{
        font-size:16px;
    }

    #cart-items{
        grid-template-columns:1fr;
        padding:15px;
    }

    .cart-card{
        width:100%;
    }

    .cart-card img{
        height:220px;
    }

    .cart-card h3{
        font-size:20px;
    }

    .price{
        font-size:18px;
    }

    .quantity{
        font-size:16px;
    }

    .buttons{
        flex-direction:column;
    }

    .remove-btn,
    .buy-btn{
        width:100%;
        font-size:15px;
    }

    .empty{
        font-size:20px;
    }

}</style>
</head>
<body>

    <h1>🛒 My Cart</h1>

    <div class="topbar">
    🛍️ Cart:
    <span id="cart-count">
        0
    </span>
</div>

    <div id="cart-items"></div>

    <script src="{% static 'js/carts.js' %}"></script>
</body>
</html>
