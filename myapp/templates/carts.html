{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
    <link href="{% static 'css/index.css' %}" rel="stylesheet">

    <style>
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #f6f8fb, #e9eef5);
    color: #222;
}

h1 {
    text-align: center;
    margin: 30px 0 10px;
    font-size: 38px;
    color: #111;
}

.topbar {
    text-align: center;
    font-size: 20px;
    margin-bottom: 20px;
    color: #444;
}

#cart-items {
    display: grid;
    grid-template-columns: repeat(auto-fit, 300px);
    gap: 25px;
    justify-content: center;
    padding: 30px;
    width: 100%;
    max-width: 1400px;
    margin: auto;
}
/*.cart-card {*/
/*    width: 100%;*/
/*    max-width: 300px;*/
/*    margin: auto;*/
/*}*/

.cart-card {
    width: 300px;
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.cart-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 14px 30px rgba(0, 0, 0, 0.16);
}

.cart-card img {
    width: 100%;
    height: 260px;
    object-fit: cover;
    background: #f3f3f3;
}

.cart-card h3 {
    font-size: 24px;
    margin: 14px 16px 6px;
    text-transform: capitalize;
}

.price {
    font-size: 20px;
    font-weight: 700;
    margin: 0 16px;
    color: #2b2b2b;
}

.quantity {
    font-size: 18px;
    margin: 8px 16px 12px;
    color: #666;
}

.buttons {
    display: flex;
    gap: 10px;
    padding: 16px;
    margin-top: auto;
}

.remove-btn,
.buy-btn {
    flex: 1;
    border: none;
    padding: 12px 14px;
    border-radius: 999px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
    transition: 0.2s ease;
}

.remove-btn {
    background: #ffcc4d;
    color: #111;
}

.buy-btn {
    background: #222;
    color: #fff;
}

.remove-btn:hover {
    background: #f1b81c;
}

.buy-btn:hover {
    background: #000;
}

.empty {
    text-align: center;
    font-size: 22px;
    color: #666;
    width: 100%;
    padding: 40px 0;
}
</style>
</head>
<body>

    <h1>🛒 My Cart</h1>

    <div class="topbar">
    🛍️ Cart:
    <span id="cart-count">
        0
    </span>
</div>

    <div id="cart-items"></div>

    <script src="{% static 'js/carts.js' %}"></script>
</body>
</html>
