{% load static %}
<!DOCTYPE html>
<head>
    <title>Buy Product</title>
    <style>

    /* ==========================
   GENERAL
========================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f4f4f4;
    text-align:center;
    padding:20px;
}

/* ==========================
   CONTAINER
========================== */

.box{
    width:100%;
    max-width:450px;
    background:white;
    margin:30px auto;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
}

/* ==========================
   IMAGE
========================== */

.box img{
    width:100%;
    max-width:250px;
    height:auto;
    aspect-ratio:1/1;
    object-fit:cover;
    border-radius:15px;
}

/* ==========================
   BUTTON
========================== */

button{
    background:black;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    margin-top:20px;
    transition:0.3s;
}

button:hover{
    background:#333;
}

/* ==========================
   LAPTOP
========================== */

@media (max-width:1024px){

    .box{
        max-width:420px;
    }

    .box img{
        max-width:220px;
    }

}

/* ==========================
   TABLET
========================== */

@media (max-width:768px){

    body{
        padding:15px;
    }

    .box{
        max-width:90%;
        padding:20px;
    }

    .box img{
        max-width:200px;
    }

    button{
        width:100%;
        font-size:16px;
    }

}

/* ==========================
   MOBILE
========================== */

@media (max-width:480px){

    body{
        padding:10px;
    }

    .box{
        width:95%;
        padding:15px;
        border-radius:15px;
    }

    .box img{
        width:100%;
        max-width:180px;
    }

    button{
        width:100%;
        padding:12px;
        font-size:15px;
    }

}
</style>
</head>
<body>

<div class="box">

<h1>Confirm Order</h1>

<img
src="{{ product_image }}"
alt="product">

<h2>
{{ product_name }}
</h2>

<h3>
₹{{ product_price }}
</h3>

<form method="POST">

    {% csrf_token %}

    <!-- Hidden fields -->
    <input type="hidden"
           name="product_name"
           value="{{ product_name }}">

    <input type="hidden"
           name="product_image"
           value="{{ product_image }}">

    <input type="hidden"
           name="product_price"
           value="{{ product_price }}">

    {{ form.as_p }}

    <button type="submit">
        Confirm Order
    </button>

</form>

</div>

</body>
